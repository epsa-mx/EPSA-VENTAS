    - assets/pdfs/Planos/RLW/Floorscales/
    - assets/pdfs/Planos/RLW/Indicadores/
    - assets/pdfs/Planos/RLW/Bascula de ejes/
    - assets/pdfs/Planos/RLW/Celdas de carga/
    - assets/pdfs/Planos/RLW/Bascula de Camiones/
    - assets/pdfs/Planos/RLW/Bascula Ferrocarrilera/
